name: gem5-syndromefuse-build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'gem5-syndromefuse-trigger.txt'
      - '.github/workflows/gem5-syndromefuse.yml'

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git scons python3-dev libboost-all-dev pkg-config zlib1g-dev libprotobuf-dev protobuf-compiler libprotoc-dev libgoogle-perftools-dev

      - name: Restore gem5 build cache
        uses: actions/cache@v4
        with:
          path: |
            gem5
          key: gem5-v25.1.0.1-null-fast-${{ runner.os }}-v2

      - name: Fetch official gem5
        run: |
          if [ ! -d gem5/.git ]; then
            git clone --depth 1 --branch v25.1.0.1 https://github.com/gem5/gem5.git gem5
          fi
          git -C gem5 rev-parse HEAD

      - name: Build NULL gem5.fast
        id: build
        working-directory: gem5
        run: |
          set -o pipefail
          scons build/NULL/gem5.fast -j4 2>&1 | tee ../gem5-build.log
          test -x build/NULL/gem5.fast

      - name: Upload complete build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gem5-null-fast-build-log-v2
          path: gem5-build.log
          retention-days: 7

      - name: Collect binary
        run: |
          set -euxo pipefail
          mkdir -p artifact
          cp gem5/build/NULL/gem5.fast artifact/gem5.fast
          chmod +x artifact/gem5.fast
          strip --strip-unneeded artifact/gem5.fast || true
          git -C gem5 rev-parse HEAD > artifact/gem5-commit.txt
          artifact/gem5.fast --version > artifact/gem5-version.txt 2>&1 || true
          ldd artifact/gem5.fast > artifact/ldd.txt 2>&1 || true
          sha256sum artifact/gem5.fast > artifact/SHA256SUMS
          file artifact/gem5.fast > artifact/file.txt
          ls -lh artifact/gem5.fast

      - name: Upload gem5 binary
        uses: actions/upload-artifact@v4
        with:
          name: gem5-null-v25.1.0.1-fast-stripped-v2
          path: artifact
          retention-days: 7
