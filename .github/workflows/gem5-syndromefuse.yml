name: gem5-syndromefuse-build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'gem5-syndromefuse-trigger.txt'
      - '.github/workflows/gem5-syndromefuse.yml'

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git scons python3-dev libboost-all-dev pkg-config zlib1g-dev libprotobuf-dev protobuf-compiler libprotoc-dev libgoogle-perftools-dev
      - name: Fetch official gem5
        run: |
          git clone --depth 1 --branch v25.1.0.1 https://github.com/gem5/gem5.git gem5
      - name: Build X86 gem5.opt
        id: build
        working-directory: gem5
        continue-on-error: true
        run: |
          set -o pipefail
          scons --no-compress-debug build/X86/gem5.opt -j2 2>&1 | tee ../gem5-build.log
      - name: Upload complete build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gem5-build-log
          path: gem5-build.log
          retention-days: 7
      - name: Fail if build failed
        if: steps.build.outcome != 'success'
        run: exit 1
      - name: Collect binary and runtime libraries
        run: |
          mkdir -p artifact/lib
          cp gem5/build/X86/gem5.opt artifact/gem5.opt
          strip artifact/gem5.opt
          artifact/gem5.opt --version > artifact/gem5-version.txt
          git -C gem5 rev-parse HEAD > artifact/gem5-commit.txt
          ldd artifact/gem5.opt > artifact/ldd.txt
          ldd artifact/gem5.opt | awk '/=> \/.*\(/ {print $3}' | while read lib; do cp -L "$lib" artifact/lib/; done
          sha256sum artifact/gem5.opt artifact/lib/* > artifact/SHA256SUMS
          du -sh artifact
      - uses: actions/upload-artifact@v4
        with:
          name: gem5-x86-v25.1.0.1-stripped
          path: artifact
          retention-days: 7
